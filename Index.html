<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="barra_superior">
  <div class="logo">Kusa</div>

  <nav class="menu_central">
    <a href="#">ABOUT</a>
    <a href="#">COURSES</a>
    <a href="#">GALLERY</a>
    <a href="#">CONTACT</a>
  </nav>

  <div class="menu_direito">
    <a href="#">LOGIN</a>
    <img src="Imagens/tik-tok.png" alt="icone tiktok" class="icones">
    <img src="Imagens/twitter.png" alt="icone twitter" class="icones">
    <img src="Imagens/instagram.png" alt="icone instagram" class="icones">
  </div>
</header>

<main>
  
  <!-- LADO ESQUERDO -->
  <section class="banner">
    <h1>Get in touch.</h1>
    <p>
      For inquires about in-person events or press opportunities,
      please feel free to reach me directly. If you're interested in 1:1 lessons, you can schedule your consultation here.
    </p>

    <p>email@example.com</p>
    <p>(555) 555 - 5555</p>
  </section>

  <!-- LADO DIREITO ONDE TEM O FORMULARIO -->
  <section class="formulario">
    <form>
      <legend>Name</legend>
      <div class="nome_formulario">
        <div>
          <label>First Name</label>
          <input type="text">
        </div>

        <div>
          <label>Last Name</label>
          <input type="text">
        </div>
      </div>

      <label>Email</label>
      <input type="email">

      <label>Subject</label>
      <input type="text">

      <label>Message</label>
      <textarea></textarea>
<!-- Lembrar de colocar obrigatorio no formulario-->
      <button>Submit</button>

    </form>
  </section>

</main>

</html>
